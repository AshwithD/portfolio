{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Ashwith D portfolio - AI, Django, Embedded Systems projects">
  <meta name="keywords" content="Ashwith, Django, AI, Portfolio, Python">
  <meta name="author" content="Ashwith D">

  <meta property="og:title" content="Ashwith D Portfolio">
  <meta property="og:description" content="AI-powered portfolio with Django and chatbot">
  <meta property="og:image" content="https://www.ashwith.cloud-ip.cc/static/images/preview.png">
  <meta property="og:url" content="https://www.ashwith.cloud-ip.cc">

  <title>{% block title %}Ashwith D — Portfolio{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="icon" type="image/jpeg" href="{% static 'images/favicon_logo.jpg' %}">
</head>
<body>
  <header>
    <div class="logo">
      <img src="{% static 'images/logo.jpg' %}" class="my-logo" alt="Logo" />
    </div>
    <nav>
      <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a>
      <a href="{% url 'about' %}" {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>About</a>
      <a href="{% url 'services' %}" {% if request.resolver_match.url_name == 'services' %}class="active"{% endif %}>Services</a>
      <a href="{% url 'portfolio' %}" {% if request.resolver_match.url_name == 'portfolio' %}class="active"{% endif %}>Portfolio</a>
      <a href="{% url 'contact' %}" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contact</a>
    </nav>

    <!-- hamburger button -->
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

  </header>

    <!-- mobile drawer -->


  <div class="mobile-drawer" id="mobile-drawer">
    <button class="drawer-close" onclick="toggleMenu()">✕</button>
    <nav class="mobile-nav">
      <a href="{% url 'home' %}" {% if request.resolver_match.url_name == 'home' %}class="active"{% endif %}>Home</a>
      <a href="{% url 'about' %}" {% if request.resolver_match.url_name == 'about' %}class="active"{% endif %}>About</a>
      <a href="{% url 'services' %}" {% if request.resolver_match.url_name == 'services' %}class="active"{% endif %}>Services</a>
      <a href="{% url 'portfolio' %}" {% if request.resolver_match.url_name == 'portfolio' %}class="active"{% endif %}>Portfolio</a>
      <a href="{% url 'contact' %}" {% if request.resolver_match.url_name == 'contact' %}class="active"{% endif %}>Contact</a>
    </nav>
  </div>

  {% block content %}
  
  
  {% endblock %}


    <!-- AI Chat Toggle Button -->
  <button class="chat-toggle" onclick="toggleChat()" id="chat-toggle-btn">
    <span class="chat-toggle-icon">🤖</span>
  </button>

  <!-- Chat Box -->
  <div class="chat-container" id="chat-container">
    <div class="chat-header">
      <span class="chat-header-dot"></span>
      <span class="chat-title">Ask Me</span>
      <span class="chat-tag">AI</span>
      <button class="chat-close" onclick="toggleChat()">✕</button>
    </div>
    <div id="chat-box"></div>
    <div class="chat-input-row">
      <input type="text" id="user-input" placeholder="Ask something..." onkeydown="if(event.key==='Enter') sendMessage()">
      <button onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>


<script>
  function toggleChat() {
    const box = document.getElementById("chat-container");
    const btn = document.getElementById("chat-toggle-btn");
    const isOpen = box.classList.contains("chat-open");
    if (isOpen) {
      box.classList.remove("chat-open");
      btn.classList.remove("chat-toggle-hidden");

      // clear history on close
      fetch("/clear-chat/", { method: "POST", headers: { "X-CSRFToken": "{{ csrf_token }}" }});
    } else {
      box.classList.add("chat-open");
      btn.classList.add("chat-toggle-hidden");
    }
  }

  async function sendMessage() {
    let input = document.getElementById("user-input");
    let message = input.value;
    if (!message) return;
    let chatBox = document.getElementById("chat-box");
    chatBox.innerHTML += `<p class="user">${message}</p>`;
    let response = await fetch("/chat/", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRFToken": "{{ csrf_token }}"
      },
      body: JSON.stringify({ message: message })
    });
    let data = await response.json();
    let botMsg = document.createElement("p");
    botMsg.className = "bot";
    chatBox.appendChild(botMsg);
    typeEffect(data.response, botMsg);
    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  function typeEffect(text, element) {
    let i = 0;
    let interval = setInterval(() => {
      element.innerHTML += text.charAt(i);
      i++;
      if (i >= text.length) clearInterval(interval);
    }, 20);
  }



  function toggleMenu() {
    const drawer = document.getElementById("mobile-drawer");
    const overlay = document.getElementById("mobile-overlay");
    const hamburger = document.getElementById("hamburger");

    drawer.classList.toggle("drawer-open");
    overlay.classList.toggle("overlay-show");
    hamburger.classList.toggle("hamburger-open");
  }

  // overlay click closes drawer
  document.getElementById("mobile-overlay").addEventListener("click", function(e) {
    if (e.target === this) toggleMenu();
  });

  // close drawer when a nav link is clicked
  document.querySelectorAll(".mobile-nav a").forEach(link => {
    link.addEventListener("click", () => toggleMenu());
  });

  // prevent touches inside the drawer from closing it
  document.getElementById("mobile-drawer").addEventListener("touchstart", function(e) {
    e.stopPropagation();
  });

  // prevent touches inside the drawer from closing it
  document.getElementById("mobile-drawer").addEventListener("click", function(e) {
    e.stopPropagation();
  });


</script>







</body>
</html>
